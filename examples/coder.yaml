version: 1

models:
  # Provider Settings in the app are the normal user path for provider, model,
  # API key, base URL, network mode, and optional proxy URL. The env fields
  # below are developer or headless fallback only.
  default:
    provider: deepseek
    model: best
    base_url_env: LLM_BASE_URL
    api_key_env: LLM_API_KEY
harnesses:
  native-code-edit:
    backend: native-rust
    tools: [repo_find_files, repo_search_text, repo_read_file, repo_read_file_range, git_status, git_diff, agent_subagent, read_subagent_status, cancel_subagent_background, command_preview, command_run, command_background, read_command_output, write_stdin, cancel_command_background, apply_patch, Skill]
    permissions:
      read_files: allow
      write_files: ask
      run_commands: ask
      child_harness_permissions: ask
      network: ask
      secrets: ask
      publish_external: deny
      git_commit: deny
      git_push: deny
      deploy: deny
    verification:
      require_evidence: true

task_profiles:
  code:
    model: default
    harness: native-code-edit
    instructions: |
      You are Coder's coding runtime. Complete the assigned task through the
      available tools and emit evidence-backed summaries for commands, file
      changes, and verification. Do not claim success without evidence.
    runtime:
      max_output_tokens: 8000
      max_output_recovery_attempts: 3
      max_consecutive_compaction_failures: 3
